<div class="field">
  @if (label()) {
    <label class="label">
      {{ label() }}
      @if (required()) {
        <span class="required">*</span>
      }
    </label>
  }

  @if (type() === 'textarea') {
    <textarea
      class="input"
      [placeholder]="placeholder()"
      [value]="value()"
      (input)="onInput($event)"
    ></textarea>
  } @else {
    <input
      class="input"
      [type]="type()"
      [placeholder]="placeholder()"
      [value]="value()"
      (input)="onInput($event)"
    />
  }
</div>
