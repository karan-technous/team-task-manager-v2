<button
  [attr.type]="type()"
  [class.secondary]="variant() === 'secondary'"
  [class.full-width]="fullWidth()"
  [disabled]="disabled()"
  [attr.aria-disabled]="disabled() ? 'true' : null"
  (click)="onClick()"
>
  @if (icon()) {
    <mat-icon>{{ icon() }}</mat-icon>
  }
  @if (label()) {
    <span>
      {{ label() }}
    </span>
  }
</button>
