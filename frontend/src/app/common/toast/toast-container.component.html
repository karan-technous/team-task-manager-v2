<div
  [class]="positionClass()"
  (mouseover)="hovered.set(true)"
  (mouseout)="onMouseOut($event)"
>
  @for (toast of visibleToasts(); track toast.id; let i = $index) {
    <app-toast
      [toast]="toast"
      [index]="i"
      [layout]="layout()"
      (close)="toastService.remove(toast.id)"
    />
  }
</div>
