<div class="panel">
  @for (panel of panels(); track panel.project; let i = $index) {
    <div class="accordion">
      <div class="header" (click)="toggle(i)" (contextmenu)="openProjectMenu($event, panel.project)">
        <div class="left">
          <mat-icon>{{ panel?.icon || icon() }}</mat-icon>
          <span class="project">
            {{ panel.project }}
          </span>
        </div>

        <mat-icon class="arrow" [class.rotate]="openIndexes().has(i)"> expand_more </mat-icon>
      </div>

      <div class="list-wrapper" [class.open]="openIndexes().has(i)">
        <div class="list">
          @for (item of panel.items; track item.title) {
            <div
              class="item"
              (click)="selectItem(item.title, panel.project)"
              [class.active]="activeItem() === item.title"
            >
              <span># {{ item.title }}</span>

              @if (item.count) {
                <span class="badge">{{ item.count }}</span>
              }
            </div>
          }
        </div>
      </div>
    </div>
  }
</div>

@if (projectMenu()) {
  <div
    class="context-backdrop"
    (click)="closeProjectMenu()"
    (contextmenu)="$event.preventDefault(); closeProjectMenu()"
  >
    <div
      class="context-menu"
      [style.left.px]="projectMenu()!.x"
      [style.top.px]="projectMenu()!.y"
      (click)="$event.stopPropagation()"
    >
      <app-list-item [label]="'Add task'" [icon]="'add'" (itemClick)="triggerProjectAction('addTask')" />
      <app-list-item
        [label]="'Delete project'"
        [icon]="'delete'"
        [variant]="'danger'"
        (itemClick)="triggerProjectAction('deleteProject')"
      />
    </div>
  </div>
}
